[gcode_macro _EXTRUDER_OFFSET_ACTION_PRESTART]
gcode:
    # {action_respond_info("extruder offset action: prestart!")}
    SET_LED LED=cavity_led WHITE=1
    EXTRUDER_OFFSET_ACTION_PREHEAT
    EXTRUDER_OFFSET_ACTION_PREHOMING
    # EXTRUDER_OFFSET_ACTION_HEAT TOOL_ID=T0 HEAT_TEMP=200
    # EXTRUDER_OFFSET_ACTION_AUTO_CLEAN TOOL_ID=T0 SAFE_MOVE_Y_POS=250
    # EXTRUDER_OFFSET_ACTION_MANUAL_CLEAN TOOL_ID=T0
    # EXTRUDER_OFFSET_ACTION_WAIT_COOL TOOL_ID=T0 TEMP=140

    # EXTRUDER_OFFSET_ACTION_HEAT TOOL_ID=T1 HEAT_TEMP=200
    # EXTRUDER_OFFSET_ACTION_AUTO_CLEAN TOOL_ID=T1 SAFE_MOVE_Y_POS=250
    # EXTRUDER_OFFSET_ACTION_MANUAL_CLEAN TOOL_ID=T1
    # EXTRUDER_OFFSET_ACTION_WAIT_COOL TOOL_ID=T1 TEMP=140

    # EXTRUDER_OFFSET_ACTION_HEAT TOOL_ID=T2 HEAT_TEMP=200
    # EXTRUDER_OFFSET_ACTION_AUTO_CLEAN TOOL_ID=T2 SAFE_MOVE_Y_POS=250
    # EXTRUDER_OFFSET_ACTION_MANUAL_CLEAN TOOL_ID=T2
    # EXTRUDER_OFFSET_ACTION_WAIT_COOL TOOL_ID=T2 TEMP=140

    # EXTRUDER_OFFSET_ACTION_HEAT TOOL_ID=T3 HEAT_TEMP=200
    # EXTRUDER_OFFSET_ACTION_AUTO_CLEAN TOOL_ID=T3 SAFE_MOVE_Y_POS=250
    # EXTRUDER_OFFSET_ACTION_MANUAL_CLEAN TOOL_ID=T3
    # EXTRUDER_OFFSET_ACTION_WAIT_COOL TOOL_ID=T3 TEMP=140

    # EXTRUDER_OFFSET_ACTION_DETECT_PLATE PRESENCE=0

    # EXTRUDER_OFFSET_ACTION_PROBE_CALIBRATE TOOL_ID=T0
    # EXTRUDER_OFFSET_ACTION_PROBE_CALIBRATE TOOL_ID=T1
    # EXTRUDER_OFFSET_ACTION_PROBE_CALIBRATE TOOL_ID=T2
    # EXTRUDER_OFFSET_ACTION_PROBE_CALIBRATE TOOL_ID=T3

    # EXTRUDER_OFFSET_ACTION_EXIT

[gcode_macro _EXTRUDER_OFFSET_ACTION_PREHOMING]
variable_force_homing: True
gcode:
    # SAVE_GCODE_STATE NAME=after_prehoming
    # G90
    # G0 Z50 F500
    # RESTORE_GCODE_STATE NAME=after_prehoming
    # {action_respond_info("extruder offset action: prehoming!")}

[gcode_macro _DETECT_PLATE]
variable_hole_x: 13
variable_hole_y: 233
variable_hole_z: 3
variable_solid_x: 13
variable_solid_y: 220
variable_solid_z: 3
variable_delta_z: 1.1
variable_check_ok_lift_z: 5
variable_check_fail_lift_z: 150
variable_move_speed: 200
gcode:
    PROBE SAMPLES=2 SAMPLES_TOLERANCE=0.1
    # {action_respond_info("extruder offset action: detect_plate!")}

[gcode_macro _EXTRUDER_OFFSET_ACTION_PREHEAT]
gcode:
    {% set default_nozzle = 140 %}
    {% set nozzle_temps = {
        'T0': params.T0_TEMP|default(params.NOZZLE_TEMP|default(default_nozzle)),
        'T1': params.T1_TEMP|default(params.NOZZLE_TEMP|default(default_nozzle)),
        'T2': params.T2_TEMP|default(params.NOZZLE_TEMP|default(default_nozzle)),
        'T3': params.T3_TEMP|default(params.NOZZLE_TEMP|default(default_nozzle))
    } %}
    {% set bed_temp = params.BED_TEMP|default(55) %}
    M140 S{bed_temp}
    # { action_respond_info("Bed heating to %s°C" % bed_temp) }
    {% for tool in ['T0', 'T1', 'T2', 'T3'] %}
        M104 {tool} S{nozzle_temps[tool]} A0
        # { action_respond_info("%s heating to %s°C" % (tool, nozzle_temps[tool])) }
        {% if tool in ['T1', 'T2'] %}
            G4 P4000
        {% endif %}
    {% endfor %}
    SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout_on_pause}
    # {action_respond_info("extruder offset action: preheat!")}

[gcode_macro _EXTRUDER_OFFSET_ACTION_HEAT_T0]
gcode:
  {% set heat_temp = params.HEAT_TEMP|default(200)|float %}
  T0 A0
  MOVE_TO_DISCARD_FILAMENT_POSITION
  M109 T0 A0 S{heat_temp}

[gcode_macro _EXTRUDER_OFFSET_ACTION_HEAT_T1]
gcode:
  {% set heat_temp = params.HEAT_TEMP|default(200)|float %}
  T1 A0
  MOVE_TO_DISCARD_FILAMENT_POSITION
  M109 T1 A0 S{heat_temp}

[gcode_macro _EXTRUDER_OFFSET_ACTION_HEAT_T2]
gcode:
  {% set heat_temp = params.HEAT_TEMP|default(200)|float %}
  T2 A0
  MOVE_TO_DISCARD_FILAMENT_POSITION
  M109 T2 A0 S{heat_temp}

[gcode_macro _EXTRUDER_OFFSET_ACTION_HEAT_T3]
gcode:
  {% set heat_temp = params.HEAT_TEMP|default(200)|float %}
  T3 A0
  MOVE_TO_DISCARD_FILAMENT_POSITION
  M109 T3 A0 S{heat_temp}

[gcode_macro _EXTRUDER_OFFSET_ACTION_AUTO_CLEAN_T0]
gcode:
    {% set filament_soft = params.SOFT | default(0) | int %}
    {% set nozzle_diameter = params.NOZZLE_DIAMETER | default(0.4) | float %}

    T0 A0
    SAVE_GCODE_STATE NAME=auto_clean_t0
    MOVE_TO_DISCARD_FILAMENT_POSITION
    G90
    M204 S10000
    M83
    {% if nozzle_diameter < 0.3 %}
      {% if filament_soft == 0 %}
        G1 E30 F210
        G1 E-20 F360
      {% else %}
        G1 E5 F60
        G1 E-10 F360
      {% endif %}
    {% else %}
      {% if filament_soft == 0 %}
        G1 E30 F600
        G1 E-20 F1200
      {% else %}
        G1 E5 F120
        G1 E-10 F600
      {% endif %}
    {% endif %}
    INNER_CUTOFF_BASE_DISCARD
    INNER_ROUGHLY_CLEAN_NOZZLE_BASE_DISCARD ACTION=4
    INNER_DISCARD_FILAMENT_BASE_DISCARD
    MOVE_TO_XY_IDLE_POSITION_EXTRUDER
    RESTORE_GCODE_STATE NAME=auto_clean_t0

