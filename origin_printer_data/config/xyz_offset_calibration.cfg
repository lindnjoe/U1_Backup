[gcode_macro _EXTRUDER_OFFSET_ACTION_WAIT_COOL_T0]
gcode:
    {% set temp = params.TEMP|default(130)|float %}
    SAVE_GCODE_STATE NAME=wait_cool_t0
    SET_FAN_SPEED FAN=cavity_fan SPEED=1
    M106 S255
    G90
    G0 X5 Y140 F12000
    M109 T0 A0 S{temp}
    SET_FAN_SPEED FAN=cavity_fan SPEED=0
    M106 S0
    RESTORE_GCODE_STATE NAME=wait_cool_t0

