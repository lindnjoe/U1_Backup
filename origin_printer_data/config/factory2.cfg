[include fluidd.cfg]

[exclude_object]

[extruder_config_bak]

[print_task_config]

[mcu]
serial: /dev/ttyS6
baud: 921600
restart_method: command

[mcu host]
serial: /tmp/klipper_host_mcu

# [include e0.cfg]
[mcu e0]
serial: /dev/serial/by-path/platform-xhci-hcd.0.auto-usb-0:1.3:1.0

# [include e1.cfg]
[mcu e1]
serial: /dev/serial/by-path/platform-xhci-hcd.0.auto-usb-0:1.4:1.0

# [include e2.cfg]
[mcu e2]
serial: /dev/serial/by-path/platform-xhci-hcd.0.auto-usb-0:1.2:1.0

# [include e3.cfg]
[mcu e3]
serial: /dev/serial/by-path/platform-xhci-hcd.0.auto-usb-0:1.1:1.0

#################################################################
###       Host MCU configuration
#################################################################
# reset pin for head hub, 1-> normal, 0->reset
[output_pin head_hub]
# GPIO0_B4 in SoC -> gpiochip0/gpio12
pin: host:gpiochip0/gpio12
value: 1
shutdown_value: 1

#################################################################
###       NFC configuration
#################################################################
[fm175xx_reader]
soc_spi_bus: 2
soc_spi_dev_num: 0
soc_spi_mode: 0
soc_spi_speed_max: 500000
soc_rst_pin: host:gpiochip1/gpio25

extra_spi_bus: 2
extra_spi_dev_num: 1
extra_spi_mode: 0
extra_spi_speed_max: 500000
extra_rst_pin: host:gpiochip1/gpio28

# Equivalently: etruder ~ extruder3
soc_ch_1: 2
soc_ch_2: 3
extra_ch_1: 0
extra_ch_2: 1

rf_1_pin: host:gpiochip1/gpio27
rf_2_pin: host:gpiochip1/gpio24

[filament_detect]

#################################################################
###       exception manager
#################################################################
# [exception_manager]
# debug: 1

#################################################################
###       input shaper configuration
#################################################################
[resonance_tester]
accel_chip: lis2dw e0_lis2dw
probe_points:
    # Somewhere slightly above the middle of your print bed
    147,154, 20
min_freq: 5
max_freq: 100
delta_freq: 10

[input_shaper]
shaper_type_x = mzv
shaper_freq_x = 42
shaper_type_y = mzv
shaper_freq_y = 46

#################################################################
###       Main MCU peripheral configuration
#################################################################
[printer]
kinematics: corexy
max_velocity: 500
max_accel: 20000
max_z_velocity: 30
max_z_accel: 500
square_corner_velocity: 8
max_logical_extruder_num: 8
max_physical_extruder_num: 4

[stepper_x]
step_pin: PC11
dir_pin: !PC12
enable_pin: !PB2
# for lead=20: rotation_distance = 200 * 16 / 160
rotation_distance: 40
microsteps: 64
# endstop_pin: ^!PB2
endstop_pin: tmc2240_stepper_x:virtual_endstop
position_min: 0
position_endstop: 0
position_max: 270
# homing_retract_dist: 0
homing_speed: 40
homing_tolerance: 0.01
homing_samples: 3
second_homing_before_delay: 0.1
homing_retract_dist: 3
second_homing_speed: 40
homing_tolerance_retries: 10
# second_homing_speed: 2
# homing_retract_speed: 10
# homing_retract_dist: 5.0

[stepper_y]
step_pin: PD2
dir_pin: PB3
enable_pin: !PB2
rotation_distance: 40
microsteps: 64
# endstop_pin: ^!PA7
endstop_pin: tmc2240_stepper_y:virtual_endstop
position_min: 0
position_endstop: 0
position_max: 335
# homing_retract_dist: 0
homing_speed: 40
homing_tolerance: 0.01
homing_samples: 3
second_homing_before_delay: 0.1
homing_retract_dist: 3
second_homing_speed: 40
homing_tolerance_retries: 10
# second_homing_speed: 2
# homing_retract_speed: 10
# homing_retract_dist: 5.0

[stepper_z]
step_pin: PE7
dir_pin: PE8
enable_pin: !PB2
rotation_distance: 8
gear_ratio: 3:1
microsteps: 16
# endstop_pin: PC15
endstop_pin: tmc2209_stepper_z:virtual_endstop
position_min: -5
position_endstop: 275
position_max: 275
homing_retract_dist: 0
homing_speed: 10
second_homing_before_delay: 0.2
homing_tolerance: 0.02
homing_retract_dist: 3
second_homing_speed: 10
homing_tolerance_retries: 10

[tmc2240 stepper_x]
cs_pin: PB12
spi_bus: spi2
# spi_software_sclk_pin: PB13
# spi_software_miso_pin: PB14
# spi_software_mosi_pin: PB15
diag0_pin: ^!PC10
driver_SGT: 1
run_current: 1.2

[tmc2240 stepper_y]
cs_pin: PE12
spi_bus: spi4
# spi_software_sclk_pin: PE11
# spi_software_miso_pin: PE13
# spi_software_mosi_pin: PE14
#cs_pin: PA4
#spi_bus: spi4
diag0_pin: ^!PC14
driver_SGT: 1
run_current: 1.2

[tmc2209 stepper_z]
uart_pin: PB4
diag_pin: ^PC15
uart_address: 0
driver_SGTHRS: 145
run_current: 0.85

[heater_bed]
heater_pin: PE9
sensor_type: Generic 3950
sensor_pin: PC2
control: pid
pid_Kp: 16.154
pid_Ki: 0.075
pid_Kd: 105.0
full_power_threshold: 30.0
zero_power_threshold: 0.45
pid2_pid_Kp: 51.172
pid2_pid_Ki: 0.625
pid2_pid_Kd: 95.0
pid2_full_power_threshold: 10.0
pid2_zero_power_threshold: 0.5
pwm_min_set_diff: 0.0015
pwm_cycle_time: 1
report_time_delta: 1
settle_delta: 1.5
smooth_time: 4.5
min_temp: -263.15
max_temp: 9999
min_temp_overshoot: 10
max_temp_overshoot: 10

[temperature_sensor cavity]
sensor_type: Generic 3950
sensor_pin: PC0
min_temp: -273.15
max_temp:  999
gcode_id: C

[fan_generic cavity_fan]
pin: !PC8
max_power: 1.0
#shutdown_speed:
#cycle_time:
#hardware_pwm:
#kick_start_time:
#off_below:
tachometer_pin: PC7
#tachometer_ppr:
tachometer_poll_interval: 0.001
#enable_pin:

[led cavity_led]
white_pin: PA10

[purifier]
pin: !PA8
max_power: 1.0
tachometer_pin: PA9
tachometer_ppr: 2
tachometer_poll_interval: 0.0005
enable_pin: PE15
extra_fan_tach_pin: PA6
power_det_pin: PA7
power_det_threshold: 0.88

[bed_mesh]
speed: 200
move_accel: 5000
horizontal_move_z: 2
mesh_min: 10, 10
mesh_max: 260, 260
probe_count: 5, 5
split_delta_z: 0.01
move_check_distance: 3
algorithm: bicubic

[homing_precise_corexy]
xy_back_offset: 5
diagonal_probe_before_delay: 0
diagonal_probe_tolerance: 0.1
diagonal_probe_tolerance_retries: 10
diagonal_probe_speed: 40
# diagonal_probe_accel: 2000
diagonal_probe_retract_speed: 60

[fan_generic power_fan]
pin: !PC9

[adc_current_sensor I_AD]
pin: PC1
sense_resistor: 0.01
scale: 33.333
voltage_offset: 0.0498

[power_loss_check]
pin: PB7
power_loss_trigger_time: 0.022
report_interval: 1
duty_threshold: 0.5
debounce_threshold: 20
type_confirm_threshold: 3

[auto_screws_tilt_adjust]
screw1: 15,15
screw1_name: front left screw
screw2: 255,15
screw2_name: front right screw
screw3: 255,255
screw3_name: rear right screw
screw4: 15,255
screw4_name: read left screw
speed: 400
probe_interval: 5
screw_order: 2,3,4,1
horizontal_move_z: 3
max_adjust_times: 100
screw_adjust_threshold: 0.05
adjust_tolerance: 0.025

[gcode_arcs]
resolution: 0.5

[gcode_macro _EXTRUDER_OFFSET_ACTION_PRESTART]
gcode:
    {action_respond_info("extruder offset action: prestart!")}
     SET_LED LED=cavity_led WHITE=1
    EXTRUDER_OFFSET_ACTION_PREHEAT
    EXTRUDER_OFFSET_ACTION_PREHOMING
    EXTRUDER_OFFSET_ACTION_DETECT_PLATE PRESENCE=0
    # EXTRUDER_OFFSET_ACTION_MANUAL_CLEAN TOOL_ID=T0
    # EXTRUDER_OFFSET_ACTION_MANUAL_CLEAN TOOL_ID=T1
    # # EXTRUDER_OFFSET_ACTION_MANUAL_CLEAN TOOL_ID=T2
    # EXTRUDER_OFFSET_ACTION_MANUAL_CLEAN TOOL_ID=T3
    # EXTRUDER_OFFSET_ACTION_PROBE_CALIBRATE TOOL_ID=T0
    # EXTRUDER_OFFSET_ACTION_PROBE_CALIBRATE TOOL_ID=T1
    # # EXTRUDER_OFFSET_ACTION_PROBE_CALIBRATE TOOL_ID=T2
    # EXTRUDER_OFFSET_ACTION_PROBE_CALIBRATE TOOL_ID=T3
    # EXTRUDER_OFFSET_ACTION_SAVE_RESULT FORCE_SAVE=1
    # EXTRUDER_OFFSET_ACTION_EXIT

[gcode_macro _EXTRUDER_OFFSET_ACTION_PREHOMING]
variable_force_homing: True
gcode:
    # SAVE_GCODE_STATE NAME=after_prehoming
    # G90
    # G0 Z50 F500
    # RESTORE_GCODE_STATE NAME=after_prehoming
    {action_respond_info("extruder offset action: prehoming!")}

[gcode_macro _DETECT_PLATE]
variable_hole_x: 30
variable_hole_y: 131
variable_hole_z: 3
variable_solid_x: 30
variable_solid_y: 110
variable_solid_z: 3
variable_delta_z: 1.1
variable_check_ok_lift_z: 5
variable_check_fail_lift_z: 150
variable_move_speed: 200
gcode:
    PROBE SAMPLES=2 SAMPLES_TOLERANCE=0.1
    # {action_respond_info("extruder offset action: detect_plate!")}

[gcode_macro _EXTRUDER_OFFSET_ACTION_PREHEAT]
gcode:
    {% set default_nozzle = 140 %}
    {% set nozzle_temps = {
        'T0': params.T0_TEMP|default(params.NOZZLE_TEMP|default(default_nozzle)),
        'T1': params.T1_TEMP|default(params.NOZZLE_TEMP|default(default_nozzle)),
        'T2': params.T2_TEMP|default(params.NOZZLE_TEMP|default(default_nozzle)),
        'T3': params.T3_TEMP|default(params.NOZZLE_TEMP|default(default_nozzle))
    } %}
    {% set bed_temp = params.BED_TEMP|default(55) %}
    M140 S{bed_temp}
    # { action_respond_info("Bed heating to %s°C" % bed_temp) }
    {% for tool in ['T0', 'T1', 'T2', 'T3'] %}
        M104 {tool} S{nozzle_temps[tool]}
        # { action_respond_info("%s heating to %s°C" % (tool, nozzle_temps[tool])) }
        {% if tool in ['T1', 'T2'] %}
            G4 P4000
        {% endif %}
    {% endfor %}
    {action_respond_info("extruder offset action: preheat!")}

[gcode_macro _EXTRUDER_OFFSET_ACTION_MANUAL_CLEAN_T0]
gcode:
    EXTRUDER_OFFSET_ACTION_CHECK_TARGET_TEMP HEATER=extruder
    T0
    SAVE_GCODE_STATE NAME=manual_clean_t0
    G90
    G0 Z150 F12000
    G0 X135 Y5 F12000
    RESTORE_GCODE_STATE NAME=manual_clean_t0
    {action_respond_info("extruder offset action: manual_clean_t0!")}

[gcode_macro _EXTRUDER_OFFSET_ACTION_MANUAL_CLEAN_T1]
gcode:
    EXTRUDER_OFFSET_ACTION_CHECK_TARGET_TEMP HEATER=extruder1
    T1
    SAVE_GCODE_STATE NAME=manual_clean_t1
    G90
    G0 Z150 F12000
    G0 X135 Y5 F12000
    RESTORE_GCODE_STATE NAME=manual_clean_t1
    {action_respond_info("extruder offset action: manual_clean_t1!")}

[gcode_macro _EXTRUDER_OFFSET_ACTION_MANUAL_CLEAN_T2]
gcode:
    EXTRUDER_OFFSET_ACTION_CHECK_TARGET_TEMP HEATER=extruder2
    T2
    SAVE_GCODE_STATE NAME=manual_clean_t2
    G90
    G0 Z150 F12000
    G0 X135 Y5 F12000
    RESTORE_GCODE_STATE NAME=manual_clean_t2
    {action_respond_info("extruder offset action: manual_clean_t2!")}

[gcode_macro _EXTRUDER_OFFSET_ACTION_MANUAL_CLEAN_T3]
gcode:
    EXTRUDER_OFFSET_ACTION_CHECK_TARGET_TEMP HEATER=extruder3
    T3
    SAVE_GCODE_STATE NAME=manual_clean_t3
    G90
    G0 Z150 F12000
    G0 X135 Y5 F12000
    RESTORE_GCODE_STATE NAME=manual_clean_t3
    {action_respond_info("extruder offset action: manual_clean_t3!")}

[gcode_macro EXTRUDER_OFFSET_ACTION_PROBE_CALIBRATE_ALL]
gcode:
    EXTRUDER_OFFSET_ACTION_PROBE_CALIBRATE TOOL_ID=T0
    EXTRUDER_OFFSET_ACTION_PROBE_CALIBRATE TOOL_ID=T1
    EXTRUDER_OFFSET_ACTION_PROBE_CALIBRATE TOOL_ID=T2
    EXTRUDER_OFFSET_ACTION_PROBE_CALIBRATE TOOL_ID=T3

[gcode_macro _EXTRUDER_OFFSET_ACTION_PROBE_CALIBRATE_T0]
gcode:
  {action_respond_info("extruder offset action: start probe_calibrate_t0!")}
  EXTRUDER_OFFSET_ACTION_CHECK_TARGET_TEMP HEATER=extruder
  EXTRUDER_OFFSET_ACTION_CHECK_TARGET_TEMP HEATER=heater_bed
  T0
  XYZ_OFFSET_CALIBRATE

[gcode_macro _EXTRUDER_OFFSET_ACTION_PROBE_CALIBRATE_T1]
gcode:
  {action_respond_info("extruder offset action: start probe_calibrate_t1!")}
  EXTRUDER_OFFSET_ACTION_CHECK_TARGET_TEMP HEATER=extruder1
  EXTRUDER_OFFSET_ACTION_CHECK_TARGET_TEMP HEATER=heater_bed
  T1
  XYZ_OFFSET_CALIBRATE

[gcode_macro _EXTRUDER_OFFSET_ACTION_PROBE_CALIBRATE_T2]
gcode:
  {action_respond_info("extruder offset action: start probe_calibrate_t2!")}
  EXTRUDER_OFFSET_ACTION_CHECK_TARGET_TEMP HEATER=extruder2
  EXTRUDER_OFFSET_ACTION_CHECK_TARGET_TEMP HEATER=heater_bed
  T2
  XYZ_OFFSET_CALIBRATE

[gcode_macro _EXTRUDER_OFFSET_ACTION_PROBE_CALIBRATE_T3]
gcode:
  {action_respond_info("extruder offset action: start probe_calibrate_t3!")}
  EXTRUDER_OFFSET_ACTION_CHECK_TARGET_TEMP HEATER=extruder3
  EXTRUDER_OFFSET_ACTION_CHECK_TARGET_TEMP HEATER=heater_bed
  T3
  XYZ_OFFSET_CALIBRATE

[gcode_macro _EXTRUDER_OFFSET_ACTION_EXIT]
gcode:
  TURN_OFF_HEATERS

[gcode_macro XYZ_OFFSET_CALIBRATE]
gcode:
  PROBE_XYZ_OFFSET_CALIBRATE SAMPLE_RETRACT_DIST=1 SAMPLES_AXIS=1 SAMPLE_DIR=1 PROBE_FAST_SPEED=2 PROBE_SPEED=2 SAMPLE_DIST=20 SAMPLES_TOLERANCE=0.02 SAMPLES_TOLERANCE_RETRIES=10 SAMPLES=3 HORIZONTAL_MOVE_X=30.5 HORIZONTAL_MOVE_Y=134.5 HORIZONTAL_MOVE_Z=2 RETRACT_Z_HIGHT=0.7 SAMPLE_TRIG_FREQ=450 PROBE_XYZ_MODE=1 HORIZONTAL_DIST=5 PROBE_POINTS=10

[gcode_macro XYZ_OFFSET_CALIBRATE_ALL]
gcode:
  T0
  G90
  G0 Z2 F1200
  XYZ_OFFSET_CALIBRATE
  T1
  XYZ_OFFSET_CALIBRATE
  T2
  XYZ_OFFSET_CALIBRATE
  T3
  XYZ_OFFSET_CALIBRATE
  EXTRUDER_OFFSET_ACTION_SAVE_RESULT FORCE_SAVE=0

[gcode_macro AUTO_BED_MESH_CALIBRATE]
gcode:
  {% set bed_temp = params.TEMP|default(55)|float %}
  {% set pause_time = params.PAUSE_TIME|default(120000)|int %}
  G90
  M140 S{bed_temp}
  G0 Z2
  M190 S{bed_temp}
  G4 P{pause_time}
  BED_MESH_CALIBRATE

